name: iScraper worker

# Runs the scheduled worker: scrapes channels, delivers due interval/near-live
# alerts, and drains queued Past Searches.
#
# NOTE: GitHub's cron granularity is 5 minutes and scheduled runs are best-effort.
# Keep workflow_dispatch enabled so Vercel or a human can trigger the worker when
# GitHub's native schedule does not create runs promptly.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually or through the API

concurrency:
  group: iscraper-worker
  cancel-in-progress: false   # never run two workers at once

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install OCR system package
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - run: pip install -r requirements-worker.txt
      
      - name: Memory before run
        run: free -h
        
      - name: Run worker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELETHON_SESSION: ${{ secrets.TELETHON_SESSION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional tunables (set as repository/environment Variables):
          SIMILARITY_THRESHOLD: ${{ vars.SIMILARITY_THRESHOLD }}
          SCRAPE_MAX_MESSAGES: ${{ vars.SCRAPE_MAX_MESSAGES }}
          SCRAPE_PROGRESS_EVERY: ${{ vars.SCRAPE_PROGRESS_EVERY }}
          SCRAPE_GROUP_BATCH_SIZE: ${{ vars.SCRAPE_GROUP_BATCH_SIZE }}
          PAST_SEARCH_JOBS_PER_RUN: ${{ vars.PAST_SEARCH_JOBS_PER_RUN }}
          WORKER_RUN_TIMEOUT_SECONDS: ${{ vars.WORKER_RUN_TIMEOUT_SECONDS }}
          WORKER_STAGE_TIMEOUT_SECONDS: ${{ vars.WORKER_STAGE_TIMEOUT_SECONDS }}
          SUPABASE_DB_RETRIES: ${{ vars.SUPABASE_DB_RETRIES }}
          SUPABASE_DB_RETRY_BACKOFF_SECONDS: ${{ vars.SUPABASE_DB_RETRY_BACKOFF_SECONDS }}
          SUPABASE_DB_RETRY_JOB_MINUTES: ${{ vars.SUPABASE_DB_RETRY_JOB_MINUTES }}
          EMBEDDING_REQUESTS_PER_MINUTE: ${{ vars.EMBEDDING_REQUESTS_PER_MINUTE }}
          EMBEDDING_INPUT_TOKENS_PER_MINUTE: ${{ vars.EMBEDDING_INPUT_TOKENS_PER_MINUTE }}
          EMBEDDING_REQUESTS_PER_DAY: ${{ vars.EMBEDDING_REQUESTS_PER_DAY }}
          EMBEDDING_DAILY_REQUEST_RESERVE: ${{ vars.EMBEDDING_DAILY_REQUEST_RESERVE }}
          EMBEDDING_MAX_PER_RUN: ${{ vars.EMBEDDING_MAX_PER_RUN }}
          EMBEDDING_QUOTA_RETRY_MINUTES: ${{ vars.EMBEDDING_QUOTA_RETRY_MINUTES }}
          EMBEDDING_BACKLOG_RETRY_MINUTES: ${{ vars.EMBEDDING_BACKLOG_RETRY_MINUTES }}
          OCR_ENABLED: ${{ vars.OCR_ENABLED }}
          OCR_LANGS: ${{ vars.OCR_LANGS }}
          OCR_TIMEOUT_SECONDS: ${{ vars.OCR_TIMEOUT_SECONDS }}
          OCR_DOWNLOAD_TIMEOUT_SECONDS: ${{ vars.OCR_DOWNLOAD_TIMEOUT_SECONDS }}
          OCR_MAX_IMAGES_PER_POST: ${{ vars.OCR_MAX_IMAGES_PER_POST }}
          OCR_MAX_IMAGE_MB: ${{ vars.OCR_MAX_IMAGE_MB }}
          OCR_MAX_IMAGE_PIXELS: ${{ vars.OCR_MAX_IMAGE_PIXELS }}
          OCR_MAX_IMAGE_DIMENSION: ${{ vars.OCR_MAX_IMAGE_DIMENSION }}
          OCR_MAX_TEXT_CHARS: ${{ vars.OCR_MAX_TEXT_CHARS }}
          OCR_SKIP_WHEN_CAPTION_PRESENT: ${{ vars.OCR_SKIP_WHEN_CAPTION_PRESENT }}
          OCR_THREAD_LIMIT: ${{ vars.OCR_THREAD_LIMIT }}
          OCR_TESSERACT_CONFIG: ${{ vars.OCR_TESSERACT_CONFIG }}
        run: /usr/bin/time -v python -m scraper.runner
      - name: Memory after run
        if: always()
        run: free -h
